<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle radar glow top -->
  <circle cx="600" cy="100" r="400" fill="rgba(59,130,246,0.04)"/>
  <circle cx="600" cy="100" r="250" fill="rgba(59,130,246,0.06)"/>

  <!-- Score ring indicator (right side) -->
  <!-- Outer ring -->
  <circle cx="820" cy="315" r="130" fill="none" stroke="rgba(148,163,184,0.12)" stroke-width="14"/>
  <!-- Score arc (fills ~75% to suggest a typical score) -->
  <path d="M 820 185 A 130 130 0 1 1 700 405" fill="none" stroke="url(#ringGrad)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Score text on ring -->
  <text x="820" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="url(#brandGrad)">86</text>
  <text x="820" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#64748b">/ 100</text>

  <!-- Logo (left side) -->
  <!-- Radar icon -->
  <circle cx="180" cy="200" r="50" fill="none" stroke="#22c55e" stroke-width="3"/>
  <path d="M 145 235 Q 180 160 215 235" fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="162" cy="220" r="5" fill="#22c55e"/>
  <circle cx="198" cy="220" r="5" fill="#22c55e"/>

  <!-- Brand name -->
  <text x="180" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="url(#brandGrad)">GeoScore</text>

  <!-- Tagline -->
  <text x="180" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">GEO Readiness Score</text>

  <!-- Main headline -->
  <text x="480" y="260" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#e2e8f0">
    Check Your Website&#8217;s
  </text>
  <text x="480" y="305" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="url(#brandGrad)">
    AI Search Visibility
  </text>

  <!-- Feature tags -->
  <rect x="480" y="340" width="110" height="28" rx="14" fill="rgba(59,130,246,0.12)"/>
  <text x="535" y="359" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa">12 Dimensions</text>

  <rect x="600" y="340" width="100" height="28" rx="14" fill="rgba(34,197,94,0.12)"/>
  <text x="650" y="359" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#4ade80">100-Point</text>

  <rect x="710" y="340" width="110" height="28" rx="14" fill="rgba(255,255,255,0.05)"/>
  <text x="765" y="359" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">Free &amp; Open</text>

  <!-- Subtitle -->
  <text x="480" y="400" font-family="system-ui,sans-serif" font-size="18" fill="#64748b">
    ChatGPT &middot; Perplexity &middot; Claude &middot; Gemini &middot; Google AIO
  </text>

  <!-- URL -->
  <text x="480" y="445" font-family="ui-monospace,monospace" font-size="14" fill="#3b82f6">deng.zh.kg</text>

  <!-- Footer line -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
  <text x="80" y="570" font-family="system-ui,sans-serif" font-size="13" fill="#475569">Open-source GEO audit tool &middot; MIT Licensed</text>

  <!-- Mini radar chart decorative (bottom right) -->
  <polygon points="1020,540 970,540 990,520" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1.5"/>
  <polygon points="1020,540 970,540 990,520 1020,500 1050,520" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <circle cx="1020" cy="540" r="2.5" fill="rgba(59,130,246,0.3)"/>
  <circle cx="970" cy="540" r="2.5" fill="rgba(59,130,246,0.3)"/>
  <circle cx="990" cy="520" r="2.5" fill="rgba(59,130,246,0.3)"/>
  <circle cx="1020" cy="500" r="2.5" fill="rgba(59,130,246,0.3)"/>
  <circle cx="1050" cy="520" r="2.5" fill="rgba(59,130,246,0.3)"/>
</svg>